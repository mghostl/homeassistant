
# Loads default set of integrations. Do not remove.
default_config:

# Load frontend themes from the themes folder
frontend:
  themes: !include_dir_merge_named themes

# Store history while reducing write pressure on the Raspberry Pi SD card.
recorder:
  purge_keep_days: 10
  auto_purge: true
  auto_repack: true
  commit_interval: 30
  include:
    entities:
      - sensor.roborock_qrevo_master_battery
  exclude:
    domains:
      - device_tracker
      - update
    entity_globs:
      - binary_sensor.roborock_qrevo_master_*
      - button.roborock_qrevo_master_*
      - image.roborock_qrevo_master_*
      - number.roborock_qrevo_master_*
      - select.roborock_qrevo_master_*
      - sensor.roborock_qrevo_master_*
      - switch.roborock_qrevo_master_*
    entities:
      - sun.sun

input_boolean:
  daily_vacuum_enabled:
    name: Daily vacuum enabled
    icon: mdi:robot-vacuum

lovelace:
  dashboards:
    dashboard-vacuum:
      mode: yaml
      filename: dashboards/vacuum.yaml
      title: Vacuum
      icon: mdi:robot-vacuum
      show_in_sidebar: true

automation: !include automations.yaml
script: !include scripts.yaml
scene: !include scenes.yaml
