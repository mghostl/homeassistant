title: Vacuum
views:
  - title: Controls
    path: controls
    icon: mdi:robot-vacuum
    cards:
      - type: entities
        title: Vacuum overview
        show_header_toggle: false
        state_color: true
        entities:
          - entity: vacuum.roborock_qrevo_master
            name: Status
            secondary_info: last-changed
          - type: attribute
            entity: vacuum.roborock_qrevo_master
            attribute: battery_level
            name: Battery
            icon: mdi:battery
            suffix: "%"
          - type: attribute
            entity: automation.daily_vacuum_cleaning_routine
            attribute: last_triggered
            name: Last run
            icon: mdi:history
            time_format:
              type: datetime
              style: short
      - type: horizontal-stack
        cards:
          - type: button
            entity: vacuum.roborock_qrevo_master
            name: Start
            icon: mdi:play
            tap_action:
              action: perform-action
              perform_action: vacuum.start
              target:
                entity_id: vacuum.roborock_qrevo_master
          - type: button
            entity: vacuum.roborock_qrevo_master
            name: Pause
            icon: mdi:pause
            tap_action:
              action: perform-action
              perform_action: vacuum.pause
              target:
                entity_id: vacuum.roborock_qrevo_master
          - type: button
            entity: vacuum.roborock_qrevo_master
            name: Return to base
            icon: mdi:home-import-outline
            tap_action:
              action: perform-action
              perform_action: vacuum.return_to_base
              target:
                entity_id: vacuum.roborock_qrevo_master
      - type: button
        entity: input_boolean.daily_vacuum_enabled
        name: Daily vacuum schedule
        icon: mdi:calendar-clock
        show_state: true
        tap_action:
          action: toggle
